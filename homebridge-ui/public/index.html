<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnvisaLink UNO Setup</title>
</head>
<body>
  <div class="container-fluid mt-2">

    <div class="row g-2 mb-2">
      <div class="col-6">
        <label for="host" class="form-label mb-1">IP Address</label>
        <input type="text" class="form-control form-control-sm" id="host" placeholder="192.168.1.100">
      </div>
      <div class="col-6">
        <label for="password" class="form-label mb-1">Password</label>
        <input type="password" class="form-control form-control-sm" id="password" placeholder="TPI password">
        <div class="form-text">Default: last 6 chars of MAC address (on device label).</div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6">
        <label for="pin" class="form-label mb-1">Alarm PIN</label>
        <input type="password" class="form-control form-control-sm" id="pin" placeholder="1234">
        <div class="form-text">A valid user code on your panel — used to disarm from HomeKit.</div>
      </div>
      <div class="col-6 d-flex align-items-center pt-3">
        <button class="btn btn-primary btn-sm w-100" id="discoverBtn" onclick="discover()">
          Discover System
        </button>
      </div>
    </div>

    <div id="status" style="display:none">
      <div id="statusMsg" class="alert alert-sm py-2 mb-2"></div>
    </div>

    <div id="results" style="display:none">
      <hr class="mt-0 mb-2">
      <h6 id="partitionTitle" class="mb-2"></h6>
      <table class="table table-sm table-bordered mb-2">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>Name</th>
            <th style="width:80px">State</th>
            <th style="width:110px">Type</th>
          </tr>
        </thead>
        <tbody id="zoneTable"></tbody>
      </table>
      <div class="d-flex justify-content-end mb-1">
        <button class="btn btn-success btn-sm" id="saveConfigBtn" onclick="saveConfig()">
          Save Configuration
        </button>
      </div>
    </div>

  </div>

  <script>
    let currentZones = [];
    let configSaved = false;

    homebridge.hideSchemaForm();
    homebridge.disableSaveButton();

    function inferSensorType(name) {
      const lower = name.toLowerCase();
      if (/motio|motion|pir/.test(lower)) return 'motion';
      if (/smok|smoke|fire/.test(lower)) return 'smoke';
      if (/co\b|carbon/.test(lower)) return 'co';
      return 'contact';
    }

    // On load: restore existing config
    homebridge.getPluginConfig().then(configs => {
      const cfg = configs[0] || {};
      if (cfg.host) document.getElementById('host').value = cfg.host;
      if (cfg.password) document.getElementById('password').value = cfg.password;
      if (cfg.pin) document.getElementById('pin').value = cfg.pin;

      if (cfg.zones && cfg.zones.length > 0) {
        currentZones = cfg.zones;
        renderZones(cfg.zones, cfg.partitionName || 'Home');
        homebridge.enableSaveButton();
      }
    });

    async function discover() {
      const host = document.getElementById('host').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!host || !password) {
        showStatus('Please enter both IP address and password.', 'warning');
        return;
      }

      const btn = document.getElementById('discoverBtn');
      btn.disabled = true;
      btn.textContent = 'Discovering...';
      configSaved = false;

      try {
        const result = await homebridge.request('/discover', { host, password });
        currentZones = result.zones;
        renderZones(result.zones, result.partitionName);
        homebridge.disableSaveButton();
        showStatus(`Found ${result.zones.length} zone(s). Adjust types if needed, then click Save Configuration.`, 'success');
      } catch (err) {
        showStatus(err.message || 'Discovery failed — check your IP address and password.', 'danger');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Discover System';
      }
    }

    function renderZones(zones, partitionName) {
      document.getElementById('partitionTitle').textContent = `Partition: ${partitionName}`;
      const tbody = document.getElementById('zoneTable');
      tbody.innerHTML = '';

      for (const zone of zones) {
        const state = zone.state || '—';
        const stateClass = state === 'OPEN' ? 'text-danger' : state === 'CLOSED' ? 'text-success' : 'text-muted';
        const typeOptions = ['contact', 'motion', 'smoke', 'co']
          .map(t => `<option value="${t}" ${t === zone.sensorType ? 'selected' : ''}>${t}</option>`)
          .join('');

        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${zone.zoneNumber}</td>
            <td>${zone.name}</td>
            <td class="${stateClass} small">${state}</td>
            <td>
              <select class="form-select form-select-sm" id="type-${zone.zoneNumber}">
                ${typeOptions}
              </select>
            </td>
          </tr>
        `);
      }

      document.getElementById('results').style.display = 'block';
    }

    async function saveConfig() {
      const host = document.getElementById('host').value.trim();
      const password = document.getElementById('password').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!host || !password) { showStatus('IP address and password are required.', 'danger'); return; }
      if (!pin) { showStatus('Alarm PIN is required.', 'danger'); return; }
      if (currentZones.length === 0) { showStatus('Please run Discover System first.', 'danger'); return; }

      // Read current dropdown selections — this is what gets saved
      const zones = currentZones.map(zone => ({
        zoneNumber: zone.zoneNumber,
        name: zone.name,
        sensorType: document.getElementById(`type-${zone.zoneNumber}`)?.value || zone.sensorType,
      }));

      try {
        const currentConfig = await homebridge.getPluginConfig();
        const updated = {
          ...(currentConfig[0] || {}),
          platform: 'EnvisalinkUNO',
          name: 'EnvisaLink UNO',
          host,
          password,
          pin,
          partitionName: document.getElementById('partitionTitle').textContent.replace('Partition: ', ''),
          zones,
        };
        await homebridge.updatePluginConfig([updated]);
        await homebridge.savePluginConfig();
        currentZones = zones;
        showStatus('Configuration saved! Click Save above to restart Homebridge.', 'success');
      } catch (err) {
        showStatus(`Save failed: ${err.message || err}`, 'danger');
      } finally {
        homebridge.enableSaveButton();
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.className = `alert alert-${type} py-2 mb-0`;
      el.textContent = msg;
      document.getElementById('status').style.display = 'block';
    }
  </script>
</body>
</html>

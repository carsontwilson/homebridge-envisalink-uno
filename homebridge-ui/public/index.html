<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnvisaLink UNO Setup</title>
</head>
<body>
  <div class="container-fluid">

    <div class="row g-2 align-items-end mb-2 mt-2">
      <div class="col-sm-4">
        <label for="host" class="form-label mb-1">IP Address</label>
        <input type="text" class="form-control form-control-sm" id="host" placeholder="192.168.1.100">
      </div>
      <div class="col-sm-4">
        <label for="password" class="form-label mb-1">Password</label>
        <input type="password" class="form-control form-control-sm" id="password" placeholder="TPI password">
        <div class="form-text">Default is the last 6 chars of your MAC address (on device label).</div>
      </div>
      <div class="col-sm-4">
        <label for="pin" class="form-label mb-1">Alarm PIN</label>
        <input type="password" class="form-control form-control-sm" id="pin" placeholder="1234">
        <div class="form-text">A valid user code programmed on your panel. Used to disarm from HomeKit.</div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col">
        <button class="btn btn-primary btn-sm" id="discoverBtn" onclick="discover()">
          Discover System
        </button>
        <span class="text-muted small ms-2">Finds your zones automatically. Run again any time to refresh.</span>
      </div>
    </div>

    <div id="status" class="row mb-2" style="display:none !important">
      <div class="col">
        <div id="statusMsg" class="alert mb-0"></div>
      </div>
    </div>

    <div id="results" style="display:none">
      <hr class="mt-1 mb-2">
      <h6 id="partitionTitle" class="mb-2"></h6>
      <table class="table table-sm table-bordered mb-2">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>State</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody id="zoneTable"></tbody>
      </table>
      <div class="d-flex justify-content-end">
        <button class="btn btn-success btn-sm" id="saveConfigBtn" onclick="saveConfig()">
          Save Configuration
        </button>
      </div>
    </div>

  </div>

  <script>
    let currentZones = [];

    homebridge.hideSchemaForm();

    // On load: restore existing config if present, show zones without requiring re-discovery
    homebridge.getPluginConfig().then(configs => {
      const cfg = configs[0] || {};
      if (cfg.host) document.getElementById('host').value = cfg.host;
      if (cfg.password) document.getElementById('password').value = cfg.password;
      if (cfg.pin) document.getElementById('pin').value = cfg.pin;

      if (cfg.zones && cfg.zones.length > 0) {
        // Existing config — show zones and enable save
        currentZones = cfg.zones;
        renderZones(cfg.zones, cfg.partitionName || 'Home', null);
        homebridge.enableSave();
      } else {
        // No config yet — disable save until discovery is done
        homebridge.disableSave();
      }
    });

    async function discover() {
      const host = document.getElementById('host').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!host || !password) {
        showStatus('Please enter both IP address and password.', 'warning');
        return;
      }

      const btn = document.getElementById('discoverBtn');
      btn.disabled = true;
      btn.textContent = 'Discovering...';

      try {
        const result = await homebridge.request('/discover', { host, password });
        currentZones = result.zones;
        renderZones(result.zones, result.partitionName, null);
        showStatus(`Found ${result.zones.length} zone(s). Review types below, then click Save Configuration.`, 'success');
        homebridge.disableSave(); // require explicit Save Configuration after fresh discovery
      } catch (err) {
        showStatus(err.message || 'Discovery failed — check your IP address and password', 'danger');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Discover System';
      }
    }

    function renderZones(zones, partitionName, states) {
      document.getElementById('partitionTitle').textContent = `Partition: ${partitionName}`;
      const tbody = document.getElementById('zoneTable');
      tbody.innerHTML = '';

      for (const zone of zones) {
        const state = states ? (states[zone.zoneNumber] || '—') : (zone.state || '—');
        const stateClass = state === 'OPEN' ? 'text-danger' : state === 'CLOSED' ? 'text-success' : '';
        const typeOptions = ['contact', 'motion', 'smoke', 'co']
          .map(t => `<option value="${t}" ${t === zone.sensorType ? 'selected' : ''}>${t}</option>`)
          .join('');

        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${zone.zoneNumber}</td>
            <td>${zone.name}</td>
            <td class="${stateClass}">${state}</td>
            <td>
              <select class="form-select form-select-sm" id="type-${zone.zoneNumber}">
                ${typeOptions}
              </select>
            </td>
          </tr>
        `);
      }

      document.getElementById('results').style.display = 'block';
    }

    async function saveConfig() {
      const host = document.getElementById('host').value.trim();
      const password = document.getElementById('password').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!host || !password || !pin) {
        showStatus('IP address, password, and alarm PIN are all required.', 'warning');
        return;
      }
      if (currentZones.length === 0) {
        showStatus('Please run Discover System first.', 'warning');
        return;
      }

      const zones = currentZones.map(zone => ({
        zoneNumber: zone.zoneNumber,
        name: zone.name,
        sensorType: document.getElementById(`type-${zone.zoneNumber}`)?.value || zone.sensorType,
      }));

      try {
        const currentConfig = await homebridge.getPluginConfig();
        const updated = {
          ...(currentConfig[0] || {}),
          platform: 'EnvisalinkUNO',
          name: 'EnvisaLink UNO',
          host,
          password,
          pin,
          partitionName: document.getElementById('partitionTitle').textContent.replace('Partition: ', ''),
          zones,
        };
        await homebridge.updatePluginConfig([updated]);
        await homebridge.savePluginConfig();
        homebridge.enableSave();
        showStatus('Configuration saved! Click Save above to apply changes.', 'success');
      } catch (err) {
        showStatus(`Save failed: ${err.message || err}`, 'danger');
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.className = `alert alert-${type} mb-0`;
      el.textContent = msg;
      document.getElementById('status').style.removeProperty('display');
    }
  </script>
</body>
</html>
